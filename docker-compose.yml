services:
  database:
    image: postgres:16-alpine
    container_name: icas-database
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=icas_cmu_hub
      - POSTGRES_USER=icas_user
      - POSTGRES_PASSWORD=icas_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icas_user -d icas_cmu_hub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: icas-backend
    ports:
      - "5002:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://icas_user:icas_password@database:5432/icas_cmu_hub?sslmode=disable
      - CORS_ORIGIN=http://localhost:3000
      - JWT_SECRET=your-secret-key-change-in-production
      - JWT_EXPIRES_IN=7d
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:

