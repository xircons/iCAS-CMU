services:
  # Optional local Postgres for offline dev. NOT used when DATABASE_URL points
  # to Supabase / external Postgres. Start with: `docker compose --profile local-db up -d`
  database:
    image: postgres:16-alpine
    container_name: icas-database
    profiles: ["local-db"]
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-icas_cmu_hub}
      POSTGRES_USER: ${POSTGRES_USER:-icas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-icas_user} -d ${POSTGRES_DB:-icas_cmu_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: icas-backend
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5000
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: icas-frontend
    ports:
      - "127.0.0.1:3001:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
